name: Video Downloader Worker

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Supabase Job ID'
        required: true
      url:
        description: 'Video URL'
        required: true
      mode:
        description: 'info or download'
        required: true
        default: 'info'
      format_id:
        description: 'Format ID (for download mode)'
        required: false
      session_id:
        description: 'User Session ID for storage cleanup'
        required: false

jobs:
  process_video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Deno
        run: |
          curl -fsSL https://deno.land/x/install/install.sh | sh
          echo "/home/runner/.deno/bin" >> $GITHUB_PATH
          /home/runner/.deno/bin/deno --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --force-reinstall https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz
          pip install -U supabase python-dotenv bgutil-ytdlp-pot-provider
          yt-dlp --version

      - name: Run Worker Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JOB_ID: ${{ github.event.inputs.job_id }}
          VIDEO_URL: ${{ github.event.inputs.url }}
          MODE: ${{ github.event.inputs.mode }}
          FORMAT_ID: ${{ github.event.inputs.format_id }}
          SESSION_ID: ${{ github.event.inputs.session_id }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: python worker/worker_script.py
