name: Video Downloader Worker

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Supabase Job ID'
        required: true
      url:
        description: 'Video URL'
        required: true
      mode:
        description: 'info or download'
        required: true
        default: 'info'
      format_id:
        description: 'Format ID (for download mode)'
        required: false

jobs:
  process_video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python_version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp supabase python-dotenv

      - name: Run Worker Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JOB_ID: ${{ github.event.inputs.job_id }}
          VIDEO_URL: ${{ github.event.inputs.url }}
          MODE: ${{ github.event.inputs.mode }}
          FORMAT_ID: ${{ github.event.inputs.format_id }}
        run: python worker/worker_script.py
