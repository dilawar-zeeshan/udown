name: Video Downloader Worker

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Supabase Job ID'
        required: true
      url:
        description: 'Video URL'
        required: true
      mode:
        description: 'info or download'
        required: true
        default: 'info'
      format_id:
        description: 'Format ID (for download mode)'
        required: false
      session_id:
        description: 'User Session ID for storage cleanup'
        required: false

jobs:
  process_video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Deno
        run: |
          curl -fsSL https://deno.land/x/install/install.sh | sh
          echo "/home/runner/.deno/bin" >> $GITHUB_PATH
          /home/runner/.deno/bin/deno --version

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --force-reinstall git+https://github.com/yt-dlp/yt-dlp.git@master
          pip install -U supabase python-dotenv bgutil-ytdlp-pot-provider yt-dlp-get-pot
          
          # Find the bgutil script path without importing
          BGUTIL_LOC=$(pip show bgutil-ytdlp-pot-provider | grep Location | cut -d' ' -f2)
          # Try to find the exact file
          SCRIPT_PATH=$(find $BGUTIL_LOC -name generate_once.ts | head -n 1)
          if [ -z "$SCRIPT_PATH" ]; then
            echo "BGUTIL_SCRIPT_PATH not found"
          else
            echo "Found Script: $SCRIPT_PATH"
            echo "BGUTIL_SCRIPT_PATH=$SCRIPT_PATH" >> $GITHUB_ENV
          fi
          
          python -m yt_dlp --version

      - name: Run Worker Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JOB_ID: ${{ github.event.inputs.job_id }}
          VIDEO_URL: ${{ github.event.inputs.url }}
          MODE: ${{ github.event.inputs.mode }}
          FORMAT_ID: ${{ github.event.inputs.format_id }}
          SESSION_ID: ${{ github.event.inputs.session_id }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: python worker/worker_script.py
